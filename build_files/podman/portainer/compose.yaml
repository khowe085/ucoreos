services:
  portainer:
    image: docker.io/portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9000:9000"
      - "9443:9443"
    environment:
      - TZ=America/New_York
    volumes:
      - /run/podman/podman.sock:/var/run/docker.sock:ro
      - portainer_data:/data

volumes:
  portainer_data: