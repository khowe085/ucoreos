services:
  portainer:
    image: docker.io/portainer/portainer-ce:lts
    container_name: portainer
    restart: always
    privileged: true
    ports:
      - "8000:8000"
      - "9443:9443"
    volumes:
      - /run/podman/podman.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data: